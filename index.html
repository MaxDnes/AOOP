<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AOP Exam Companion · Avalonia / SOLID / Testing</title>
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="designer.css">
<link rel="stylesheet" href="analyzer.css">
<link rel="stylesheet" href="testlab.css">
<link rel="stylesheet" href="querylab.css">
<link rel="stylesheet" href="asynclab.css">
<link rel="stylesheet" href="guide.css">
<link rel="stylesheet" href="quiz.css">
<link rel="stylesheet" href="mvvmconv.css">
<link rel="stylesheet" href="adapt.css">
<link rel="stylesheet" href="errors.css">
<link rel="stylesheet" href="bootcamp.css">
</head>
<body>
  <div class="frame">

    <aside class="sidebar" id="sidebar">
      <div class="brand" onclick="go('home')" title="Home (H)">
        <div class="brand-mark">AOP</div>
        <div class="brand-text">
          <span class="brand-title">EXAM COMPANION</span>
          <span class="brand-sub">Avalonia · SOLID · Testing · F26</span>
        </div>
      </div>
      <nav class="nav" id="nav"></nav>
      <div class="sidebar-foot">
        <span class="kbd">/</span> search &nbsp; <span class="kbd">H</span> home &nbsp; <span class="kbd">←</span><span class="kbd">→</span> prev/next
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <button class="burger" id="burger" title="Toggle sidebar">☰</button>
        <div class="searchwrap">
          <span class="search-icon">⌕</span>
          <input id="search" type="text" autocomplete="off" spellcheck="false"
                 placeholder="Search everything… (binding, lock, GroupBy, RelayCommand, deadlock, xunit…)">
          <span class="search-hint kbd">/</span>
        </div>
        <button class="pinbtn" id="pinbtn" title="Pin / unpin this topic">☆</button>
      </header>
      <div class="content" id="content"></div>
    </main>

  </div>

  <div class="toast" id="toast">Copied ✓</div>

  <script>window.TOPICS = [];</script>
  <script src="data/lab.js"></script>
  <script src="data/builder.js"></script>
  <!-- projzip-core defines window.PROJZIP (the .zip writer + .NET project
       scaffolds). Load it BEFORE every solver tool so their "Export project
       (.zip)" buttons see it; tools degrade gracefully (button hidden) if absent. -->
  <script src="data/projzip-core.js"></script>
  <script src="data/designer-core.js"></script>
  <script src="data/designer.js"></script>
  <script src="data/analyzer-core.js"></script>
  <script src="data/analyzer.js"></script>
  <script src="data/exam-fixtures.js"></script>
  <script src="data/testlab-core.js"></script>
  <!-- worked-examples gallery (window.TESTLAB_EXAMPLES): curated C# inputs the
       Test Lab loads one-click to demonstrate how tests are generated. Plain
       data, loaded before testlab.js which reads it at render time. -->
  <script src="data/testlab-examples.js"></script>
  <!-- per-mode testing guidance (window.TESTLAB_GUIDE): how to write each kind of
       test (unit / headless / async / ...). Plain data, read by testlab.js. -->
  <script src="data/testlab-guide.js"></script>
  <script src="data/testlab.js"></script>
  <script src="data/quiz-bank.js"></script>
  <script src="data/quiz.js"></script>
  <script src="data/querylab-core.js"></script>
  <script src="data/querylab.js"></script>
  <script src="data/asynclab-core.js"></script>
  <script src="data/asynclab.js"></script>
  <!-- MVVM Converter: CodeBehind <-> MVVM. Core (logic) before UI; no PROJZIP dep
       (submission is plain blobs). Both load before app.js like every tool. -->
  <script src="data/mvvmconv-core.js"></script>
  <script src="data/mvvmconv.js"></script>
  <!-- Adapt Lab: rewrite the generic "ExamApp" names in generated code to match
       the exam's real starter project. Core (logic) before UI; no PROJZIP dep. -->
  <script src="data/adapt-core.js"></script>
  <script src="data/adapt.js"></script>
  <!-- Error Decoder: offline KB of the build/runtime errors in this stack, with
       a paste-the-error matcher. Static data core before its UI. -->
  <script src="data/errors-core.js"></script>
  <script src="data/errors.js"></script>
  <!-- guide tool: orientation tab, UI-only (no core file), defines window.GUIDE -->
  <script src="data/guide.js"></script>
  <!-- bootcamp-demos: runnable example registry the bootcamp embeds (Download +
       preview + full source inline). Reads window.PROJZIP at click time, so it
       loads after projzip-core and before bootcamp.js which references the ids. -->
  <script src="data/bootcamp-demos.js"></script>
  <script src="data/bootcamp.js"></script>
  <script src="data/playbooks.js"></script>
  <script src="data/solutions-summer.js"></script>
  <script src="data/solutions-reexam.js"></script>
  <script src="data/design.js"></script>
  <script src="data/oop.js"></script>
  <script src="data/csharp.js"></script>
  <script src="data/solid.js"></script>
  <script src="data/avalonia.js"></script>
  <script src="data/mvvm.js"></script>
  <script src="data/collections.js"></script>
  <script src="data/linq.js"></script>
  <script src="data/threading.js"></script>
  <script src="data/testing.js"></script>
  <script src="data/algorithms.js"></script>
  <script src="data/process.js"></script>
  <script src="data/exams.js"></script>
  <!-- glossary / wiki: a searchable base of every course term + notation, plus a
       link to the merged lecture-slides PDF (assets/AOP-all-lectures.pdf) -->
  <script src="data/glossary.js"></script>
  <!-- per-topic collapsible "Examples" sections (window.TOPIC_EXAMPLES); loaded
       after all content modules so renderExamples() can append them to any topic -->
  <script src="data/examples.js"></script>
  <!-- token-based syntax highlighter (window.HIGHLIGHT_CORE); app.js bridges to it -->
  <script src="data/highlight-core.js"></script>
  <script src="app.js"></script>
</body>
</html>
